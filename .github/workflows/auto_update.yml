name: Auto Update ROS Rules

on:
  schedule:
    # 每天 UTC 时间 20:00 (北京时间凌晨 04:00) 自动运行
    - cron: '0 20 * * *'
  # 允许在 GitHub 网页端手动触发
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run Update Scripts
        run: |
          php update_cn.php
          php update_dns.php
          php update_adlist.php

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 强制将 3 个生成的规则文件添加到暂存区
          git add proxy_dns.rsc
          git add cn_cache.rsc
          git add reject_adlist.txt
          
          # 判断是否有变动，避免空提交报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update rules: $(date +'%Y-%m-%d')"
            git push
          fi
